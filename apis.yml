aid: google-voice
name: Google Voice API
description: >-
  Google Voice is a telecommunications service by Google that provides call
  forwarding, voicemail, text messaging, and voice calling for personal and
  Google Workspace business accounts. While Google Voice does not offer an
  official standalone REST API, voice services can be managed programmatically
  through the Google Workspace Admin SDK for provisioning users, assigning
  numbers, and managing locations. Google Voice integrates with Google Workspace
  for enterprise telephony management.
